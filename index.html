<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Separation Anxiety · our story archive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #0b0c15, #03040a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Cascadia Code', 'SF Mono', 'Courier New', monospace;
      padding: 2rem;
      position: relative;
      color: #edeef2;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjUiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    .story-card {
      max-width: 780px;
      width: 100%;
      background: rgba(18, 22, 35, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 245, 215, 0.15);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(235, 220, 180, 0.05) inset;
      padding: 2.5rem 2rem;
      transition: all 0.2s ease;
      z-index: 2;
    }

    .title-section {
      text-align: center;
      margin-bottom: 2rem;
      border-bottom: 1px dashed rgba(235, 220, 180, 0.3);
      display: inline-block;
      width: 100%;
    }

    h1 {
      font-family: 'Inter', 'Times New Roman', serif;
      font-weight: 500;
      font-size: 2.3rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #FDEBD0, #E9C79E);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-block;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .sub {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a9aec9;
      margin-top: -0.2rem;
      margin-bottom: 0.75rem;
      font-weight: 400;
    }

    /* password gate */
    .password-gate {
      text-align: center;
      padding: 1rem 0.5rem;
    }

    .password-label {
      font-size: 0.9rem;
      color: #cfd2e6;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      display: block;
    }

    .password-input-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .password-input {
      background: rgba(10, 12, 22, 0.8);
      border: 1px solid rgba(220, 200, 150, 0.4);
      border-radius: 60px;
      padding: 12px 20px;
      font-family: 'Cascadia Code', monospace;
      font-size: 1rem;
      color: #f1e9d8;
      outline: none;
      width: 200px;
      text-align: center;
      transition: all 0.2s;
    }

    .password-input:focus {
      border-color: #e9c79e;
      box-shadow: 0 0 10px rgba(233, 199, 158, 0.3);
    }

    .password-btn {
      background: rgba(233, 199, 158, 0.2);
      border: 1px solid #e9c79e;
      border-radius: 60px;
      padding: 12px 24px;
      font-family: 'Inter', monospace;
      font-weight: 500;
      color: #f3e3ca;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .password-btn:hover {
      background: rgba(233, 199, 158, 0.5);
      color: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .error-msg {
      color: #f0a3a3;
      font-size: 0.8rem;
      margin-top: 1rem;
      min-height: 2rem;
    }

    /* story selector (blog-like) */
    .story-selector {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .selector-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #b9bdd6;
      margin-bottom: 0.7rem;
    }

    .story-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .story-btn {
      background: rgba(25, 30, 45, 0.7);
      border: 1px solid rgba(233, 199, 158, 0.4);
      border-radius: 40px;
      padding: 8px 18px;
      font-family: 'Inter', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: #e9dbbc;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(2px);
    }

    .story-btn:hover {
      background: rgba(233, 199, 158, 0.25);
      border-color: #e9c79e;
      color: white;
    }

    .story-btn.active {
      background: rgba(233, 199, 158, 0.4);
      border-color: #f3cf9a;
      color: #fff3e0;
      box-shadow: 0 0 6px rgba(233, 199, 158, 0.4);
    }

    /* typewriter container */
    .typewriter-area {
      background: rgba(8, 10, 18, 0.55);
      border-radius: 1.8rem;
      padding: 1.6rem 1.9rem;
      margin: 1rem 0 0.5rem 0;
      border: 1px solid rgba(220, 200, 150, 0.2);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .story-text {
      font-family: 'Cascadia Code', 'Courier Prime', 'Fira Code', monospace;
      font-size: 1.05rem;
      line-height: 1.75;
      color: #f1f0eb;
      text-shadow: 0 1px 1px rgba(0,0,0,0.2);
      white-space: pre-wrap;
      word-break: break-word;
      font-weight: 420;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background-color: #f3cf9a;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
      border-radius: 2px;
    }

    .cursor.hidden-cursor {
      display: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; background-color: #f3cf9a; box-shadow: 0 0 4px #f0c28e; }
      50% { opacity: 0; background-color: #b89a6a; }
    }

    .decorative-footer {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #8b8ea8;
      border-top: 1px dashed rgba(235, 220, 180, 0.2);
      padding-top: 1.4rem;
      text-align: center;
    }

    .heart-icon {
      animation: softPulse 2s infinite ease;
      display: inline-block;
    }

    @keyframes softPulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; text-shadow: 0 0 4px #f4cda6; }
      100% { transform: scale(1); opacity: 0.7; }
    }

    .hidden-content {
      display: none;
    }

    @media (max-width: 600px) {
      .story-card {
        padding: 1.6rem 1.2rem;
      }
      .story-text {
        font-size: 0.95rem;
        line-height: 1.65;
      }
      h1 {
        font-size: 1.8rem;
      }
      .typewriter-area {
        padding: 1.2rem 1.2rem;
      }
    }
  </style>
</head>
<body>

<div class="story-card">
  <div class="title-section">
    <h1>✦ separation anxiety ✦</h1>
    <div class="sub">
      <span>⚘</span> a story for you <span>⚘</span>
    </div>
  </div>

  <!-- Password Gate -->
  <div id="passwordGate" class="password-gate">
    <div class="password-label">🔐 enter the secret key</div>
    <div class="password-input-group">
      <input type="password" id="passwordInput" class="password-input" placeholder="• • •" autocomplete="off">
      <button id="unlockBtn" class="password-btn">unlock</button>
    </div>
    <div id="errorMsg" class="error-msg"></div>
  </div>

  <!-- Hidden blog area (appears after password) -->
  <div id="hiddenStoryWrapper" class="hidden-content">
    <!-- story selector -->
    <div class="story-selector">
      <div class="selector-label">✧ pick a letter ✧</div>
      <div class="story-buttons" id="storyButtonsContainer"></div>
    </div>

    <!-- typewriter area -->
    <div class="typewriter-area">
      <div id="storyDisplay" class="story-text"></div>
      <span id="cursorSpan" class="cursor"></span>
    </div>

    <div class="decorative-footer">
      <span>🌙</span>
      <span>working on it · together</span>
      <span class="heart-icon">❤︎</span>
    </div>
  </div>
</div>

<script>
  // ---------- STORY ARCHIVE (add as many as you like) ----------
  const stories = [
    {
      id: "usual",
      title: "📖 our usual story",
      content: `Hey. We're a weird combo you know? I debug code for a living, and you spend your days behind the teller window, handling cash and making people's mornings a little brighter. Somehow, our puzzle pieces fit.

You tell me about your regulars, the counting process and "tea", and I ramble about curious findings and code bugs that took three hours to solve. Yet when we're on a call at night, none of that matters — it's just us, laughing at how our worlds manage to feel like the same room.

The separation anxiety hits hardest on Sunday evenings. You're about to head into a week of early shifts, counting drawers and helping customers, and I've got a sprint deadline looming. We squeeze in some Facetime while you're on the road, and you'll say "we'll figure this out." And I know we will.

We're not the typical love story. Our dates have been special, feeling like time stops and our late-night calls are full with jokes only we understand. Our love language is being there for each other, sending tiktoks and talking about being excited for when the next time we'll actually be in the same room.

But here's the thing: we're working on it. We've got a shared calendar counting down to when we can stop saying "see you soon" and just say "good morning" in person.

Until then, I'll keep being your tech support, and you'll keep reminding me that the best investments we make are in us. We're two busy people building a life in the margins, and honestly? It's the best project either of us has ever worked on.`
    },
    {
      id: "rainy",
      title: "☔ rainy day · the puddle waltz",
      content: `It's raining today. The kind of soft, endless rain that makes the whole world feel like a watercolour painting — blurred edges, warm cups of tea, and the sound of droplets against your bank's window.

I'm sitting here listening to the storm roll through my neighbourhood, and I can't help but imagine you counting your drawer, looking up at the grey sky, and thinking the same thing I am: "I wish we were watching this together."

There's something about rain that makes distance feel louder. Every drop is a little reminder of a kiss I owe you, a hand I'd hold under an umbrella, the way your hair smells after being caught in a drizzle.

But then I smile, because rain also means growth. It means we're watering the same garden even from two different cities. You texted me "it's pouring here too" — and suddenly we're sharing the same weather, the same mood, the same quiet hope.

One day we'll sit by a foggy window, listening to the rain hit the glass, and we won't have to say "I miss you" because we'll finally be in the same room. Until then, I'll keep sending you voice notes with the rain in the background, and you'll keep sending me pictures of wet sidewalks from your break.

We're two people learning to dance in separate puddles, but our rhythm has always been the same. This rain is just a prelude to our spring.`
    }
    // 👇 add more stories here following the same format
    // { id: "another", title: "✨ title", content: "..." },
  ];

  // DOM elements
  const passwordGate = document.getElementById('passwordGate');
  const hiddenWrapper = document.getElementById('hiddenStoryWrapper');
  const passwordInput = document.getElementById('passwordInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const errorMsg = document.getElementById('errorMsg');
  const storyContainer = document.getElementById('storyDisplay');
  const cursorSpan = document.getElementById('cursorSpan');
  const storyButtonsContainer = document.getElementById('storyButtonsContainer');

  let activeStoryId = stories[0].id;
  let typingInterval = null;
  let index = 0;
  const typingSpeed = 48;

  // Typewriter engine
  function startTypewriter(content) {
    if (typingInterval) clearInterval(typingInterval);
    storyContainer.textContent = '';
    index = 0;
    cursorSpan.classList.remove('hidden-cursor');

    typingInterval = setInterval(() => {
      if (index < content.length) {
        storyContainer.textContent = content.substring(0, index + 1);
        index++;
        if (index === content.length) {
          clearInterval(typingInterval);
          typingInterval = null;
          setTimeout(() => {
            cursorSpan.classList.add('hidden-cursor');
          }, 800);
        }
      } else {
        clearInterval(typingInterval);
        typingInterval = null;
        cursorSpan.classList.add('hidden-cursor');
      }
    }, typingSpeed);
  }

  // Load a story by ID
  function loadStory(storyId) {
    const story = stories.find(s => s.id === storyId);
    if (!story) return;
    activeStoryId = storyId;
    startTypewriter(story.content);
    // update active button style
    document.querySelectorAll('.story-btn').forEach(btn => {
      if (btn.dataset.id === storyId) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  // Build the story selector buttons
  function buildSelector() {
    storyButtonsContainer.innerHTML = '';
    stories.forEach(story => {
      const btn = document.createElement('button');
      btn.className = 'story-btn';
      btn.textContent = story.title;
      btn.dataset.id = story.id;
      btn.addEventListener('click', () => {
        if (activeStoryId !== story.id) {
          loadStory(story.id);
        }
      });
      storyButtonsContainer.appendChild(btn);
    });
    // set active class on first story
    const firstBtn = storyButtonsContainer.querySelector('.story-btn');
    if (firstBtn) firstBtn.classList.add('active');
  }

  // Unlock with password
  function unlockContent() {
    const entered = passwordInput.value.trim();
    if (entered === "Clo") {
      passwordGate.classList.add('hidden-content');
      hiddenWrapper.classList.remove('hidden-content');
      buildSelector();
      // load the first story (or the one saved)
      loadStory(stories[0].id);
      errorMsg.textContent = '';
    } else {
      errorMsg.textContent = '❄️ not quite... try again? ❄️';
      passwordInput.value = '';
      passwordInput.focus();
    }
  }

  // Event listeners
  unlockBtn.addEventListener('click', unlockContent);
  passwordInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') unlockContent();
  });

  // Double-click restart (works on the typewriter area after unlocked)
  const card = document.querySelector('.story-card');
  card.addEventListener('dblclick', (e) => {
    if (!hiddenWrapper.classList.contains('hidden-content')) {
      const currentStory = stories.find(s => s.id === activeStoryId);
      if (currentStory) {
        if (typingInterval) clearInterval(typingInterval);
        storyContainer.textContent = '';
        cursorSpan.classList.remove('hidden-cursor');
        index = 0;
        startTypewriter(currentStory.content);
        const area = document.querySelector('.typewriter-area');
        if (area) {
          area.style.transition = 'background 0.15s';
          area.style.background = 'rgba(30, 25, 45, 0.8)';
          setTimeout(() => {
            area.style.background = 'rgba(8, 10, 18, 0.55)';
          }, 180);
        }
      }
    }
  });
</script>

</body>
</html>
